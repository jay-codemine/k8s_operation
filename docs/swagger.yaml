definitions:
  errorcode.Error:
    type: object
  requests.AuthForgotPasswordRequest:
    properties:
      confirm:
        type: string
      new_password:
        type: string
      username:
        type: string
    type: object
  requests.AuthLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  requests.AuthRegisterRequest:
    properties:
      password:
        type: string
      password_confirm:
        type: string
      username:
        type: string
    type: object
  requests.BasicAuthFields:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  requests.CicdBuildCallbackRequest:
    properties:
      build_id:
        description: Jenkins 构建ID
        type: integer
      image_digest:
        description: 镜像摘要（可选）
        type: string
      image_repo:
        description: 构建出的镜像Repo
        type: string
      image_tag:
        description: 构建出的镜像Tag
        type: string
      message:
        description: 构建消息
        type: string
      status:
        description: SUCCESS / FAILURE / ABORTED
        type: string
    type: object
  requests.CicdReleaseCreateRequest:
    properties:
      app_name:
        type: string
      cluster_ids:
        items:
          type: integer
        type: array
      concurrency:
        type: integer
      container_name:
        type: string
      image_digest:
        type: string
      image_repo:
        type: string
      image_tag:
        type: string
      namespace:
        type: string
      request_id:
        description: 可选，幂等校验用
        type: string
      strategy:
        type: string
      timeout_sec:
        type: integer
      workload_kind:
        type: string
      workload_name:
        type: string
    type: object
  requests.CicdReleaseIDRequest:
    properties:
      id:
        type: integer
    type: object
  requests.CommonIdRequest:
    properties:
      id:
        type: integer
    type: object
  requests.CreatedResource:
    properties:
      index:
        type: integer
      kind:
        type: string
      message:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.DockerFields:
    properties:
      auth:
        type: string
      email:
        type: string
      password:
        type: string
      server:
        type: string
      username:
        type: string
    type: object
  requests.EnvVarKV:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  requests.EnvironmentVariable:
    properties:
      name:
        description: 环境变量名
        type: string
      value:
        description: 环境变量值
        type: string
    type: object
  requests.FailedResource:
    properties:
      error:
        type: string
      index:
        type: integer
      kind:
        type: string
      message:
        type: string
      name:
        type: string
    type: object
  requests.HealthCheckDetail:
    properties:
      command:
        description: Type=Command 时使用
        type: string
      failure_threshold:
        type: integer
      http_header:
        items:
          $ref: '#/definitions/requests.HttpHeader'
        type: array
      initial_delay_seconds:
        type: integer
      path:
        type: string
      period_seconds:
        type: integer
      port:
        type: integer
      protocol:
        type: string
      success_threshold:
        type: integer
      timeout_seconds:
        type: integer
      type:
        description: HTTP|TCP|Command
        type: string
    type: object
  requests.HttpHeader:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  requests.IngressPathRule:
    properties:
      path:
        description: 访问路径（如 /、/api、/api/(.*)）
        type: string
      path_type:
        description: 'pathType: Exact / Prefix / ImplementationSpecific'
        type: string
      service_name:
        description: 后端 Service 名称
        type: string
      service_port:
        description: 后端 Service 端口（支持命名端口，故用字符串；可传 "80" 或 "http"）
        type: string
    type: object
  requests.IngressRule:
    properties:
      host:
        type: string
      paths:
        items:
          $ref: '#/definitions/requests.IngressPathRule'
        type: array
    type: object
  requests.IngressTLS:
    properties:
      hosts:
        items:
          type: string
        type: array
      secret_name:
        type: string
    type: object
  requests.K8sClusterCreateRequest:
    properties:
      cluster_name:
        type: string
      cluster_version:
        type: string
      kube_config:
        type: string
    type: object
  requests.K8sClusterDeleteRequest:
    properties:
      force:
        description: 可选：是否强制删除
        type: boolean
      id:
        type: integer
    type: object
  requests.K8sClusterInitRequest:
    properties:
      id:
        type: integer
    type: object
  requests.K8sClusterUpdateRequest:
    properties:
      cluster_name:
        type: string
      cluster_version:
        type: string
      id:
        type: integer
      kube_config:
        description: ✅ 可选（不填就不更新）
        type: string
    type: object
  requests.KubeAppConfigCreateRequest:
    properties:
      app_name:
        type: string
      cluster_id:
        type: integer
      enable_metrics:
        type: boolean
      env:
        description: 只校验 env 存在，不校验内部字段
        items:
          $ref: '#/definitions/requests.EnvVarKV'
        type: array
      image:
        type: string
      namespace:
        type: string
      replicas:
        description: 可选
        type: integer
      strategy:
        type: string
    type: object
  requests.KubeAppConfigUpdateRequest:
    properties:
      app_name:
        type: string
      cluster_id:
        type: integer
      enable_metrics:
        type: boolean
      env:
        description: 可选
        items:
          $ref: '#/definitions/requests.EnvVarKV'
        type: array
      image:
        type: string
      namespace:
        type: string
      replicas:
        type: integer
      strategy:
        type: string
    type: object
  requests.KubeApplyYamlClusterRequest:
    properties:
      name:
        type: string
      yaml:
        type: string
    type: object
  requests.KubeApplyYamlRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      yaml:
        type: string
    type: object
  requests.KubeConfigMapApplyYamlRequest:
    properties:
      yaml:
        description: YAML 字符串，包含 namespace 和 name
        type: string
    type: object
  requests.KubeConfigMapCreateRequest:
    properties:
      annotations:
        type: string
      binaryData:
        additionalProperties:
          items:
            format: int32
            type: integer
          type: array
        type: object
      data:
        description: ConfigMap 的数据部分：文本型与二进制型
        type: string
      labels:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeConfigMapUpdateDataRequest:
    properties:
      binaryData:
        additionalProperties:
          items:
            format: int32
            type: integer
          type: array
        description: 二选一
        type: object
      data:
        additionalProperties:
          type: string
        description: 二选一
        type: object
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeCronJobCreateRequest:
    type: object
  requests.KubeCronJobDeleteRequest:
    properties:
      cascade:
        description: 是否级联清理：通常删除 CronJob 时是否一并清理其历史 Job
        type: boolean
      force:
        type: boolean
      grace_period_seconds:
        type: integer
      name:
        type: string
      namespace:
        type: string
      timeout_seconds:
        type: integer
      wait:
        type: boolean
    type: object
  requests.KubeCronJobSuspendRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      suspend:
        description: true=暂停，false=恢复
        type: boolean
    type: object
  requests.KubeCronJobTriggerRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDaemonSetCreateRequest:
    type: object
  requests.KubeDaemonSetRollbackRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      revision_name:
        description: |-
          指定回滚到的历史版本（ControllerRevision）
          建议用 revision_name（更直观），如果你喜欢数字 revision 也可以再加一个 int64 字段做二选一
        type: string
    type: object
  requests.KubeDaemonSetUpdateImageRequest:
    properties:
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 nginx:1.27
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentCreateRequest:
    type: object
  requests.KubeDeploymentRestartRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentRollbackRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      replica_set:
        description: 指定回滚的 ReplicaSet
        type: string
    type: object
  requests.KubeDeploymentScaleRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      scale_num:
        description: 副本数量
        type: integer
    type: object
  requests.KubeDeploymentUpdateImageRequest:
    properties:
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 nginx:1.27
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeDeploymentUpdateRequest:
    type: object
  requests.KubeEventListRequest:
    properties:
      continue:
        type: string
      kind:
        description: Deployment/StatefulSet/DaemonSet/Pod/Node...
        type: string
      limit:
        description: 默认 50
        type: integer
      name:
        type: string
      namespace:
        description: 为空=全局
        type: string
      reason:
        type: string
      since_seconds:
        type: integer
      type:
        description: Normal | Warning
        type: string
    type: object
  requests.KubeIngressCreateRequest:
    properties:
      annotations:
        description: 可选注解（如 rewrite、限流等）
        type: string
      ingress_class_name:
        description: 例如："nginx"、"traefik"；可为空（走默认 class）
        type: string
      labels:
        description: 可选标签
        type: string
      name:
        type: string
      namespace:
        type: string
      rules:
        description: 规则：支持多个 host
        items:
          $ref: '#/definitions/requests.IngressRule'
        type: array
      tls:
        description: 可选 TLS 列表
        items:
          $ref: '#/definitions/requests.IngressTLS'
        type: array
    type: object
  requests.KubeJobCreateRequest:
    type: object
  requests.KubeJobRestartRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeJobSuspendRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      suspend:
        description: true=挂起，false=恢复
        type: boolean
    type: object
  requests.KubeJobUpdateImageRequest:
    properties:
      container:
        type: string
      image:
        type: string
      name:
        type: string
      namespace:
        type: string
      touch:
        description: 可选：是否打一个 annotation 强制模板变化（方便触发 controller 识别到变更）
        type: boolean
    type: object
  requests.KubeMultiResourceApplyYamlRequest:
    properties:
      yaml:
        description: 多个 YAML 文档，用 --- 分隔
        type: string
    type: object
  requests.KubeNamespaceCreateRequest:
    properties:
      annotations:
        type: object
      description:
        description: 描述信息（可选） -> 写入 annotation
        type: string
      labels:
        description: Labels（可选）
        type: object
      name:
        description: Namespace 名称（必填）
        type: string
      quota_cpu:
        type: string
      quota_memory:
        type: string
      quota_pods:
        type: string
    type: object
  requests.KubeNamespaceLabelPatchRequest:
    properties:
      add:
        additionalProperties:
          type: string
        description: 添加/更新的标签
        type: object
      name:
        type: string
      remove:
        description: 要删除的标签 key
        items:
          type: string
        type: array
    type: object
  requests.KubeNamespaceUpdateRequest:
    type: object
  requests.KubeNodeCordonRequest:
    properties:
      nodeName:
        type: string
      unschedulable:
        type: boolean
    type: object
  requests.KubeNodeDrainRequest:
    properties:
      deleteEmptyDir:
        description: 是否删除使用 emptyDir 的 Pod（等价于 kubectl drain 的 --delete-emptydir-data）
        type: boolean
      dryRun:
        description: 仅打印将要执行的动作，而不真正执行（DryRun 模式）
        type: boolean
      force:
        description: 是否强制驱逐（等价于 --force），比如没有 PDB / 本地存储等场景
        type: boolean
      gracePeriodSeconds:
        description: |-
          Pod 的优雅退出时间，单位秒：
            -1 = 使用 Pod 自己的 terminationGracePeriodSeconds
             0 = 立刻删除（不推荐）
           > 0 = 指定宽限期
        type: integer
      ignoreDaemonSets:
        default: true
        description: 是否忽略 DaemonSet Pod（等价于 --ignore-daemonsets）
        type: boolean
      nodeName:
        description: 要 drain 的节点名（必填）
        type: string
      podSelector:
        description: |-
          仅匹配特定 Label 的 Pod，格式与 labelSelector 相同：
            例如： "app=myapp,env=prod"
        type: string
      timeoutSeconds:
        description: 整个 drain 操作的超时时间（秒），0 表示不超时（可交给 HTTP ctx 控制）
        type: integer
    type: object
  requests.KubeNodeLabelPatchRequest:
    properties:
      add:
        type: string
      name:
        type: string
      remove:
        items:
          type: string
        type: array
    type: object
  requests.KubeNodeTaintPatchRequest:
    type: object
  requests.KubePVApplyYamlRequest:
    properties:
      name:
        type: string
      yaml:
        type: string
    type: object
  requests.KubePVCCreateRequest:
    type: object
  requests.KubePVCResizeRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      storage:
        description: e.g. "20Gi"
        type: string
    type: object
  requests.KubePVCreateFromYamlRequest:
    properties:
      yaml:
        type: string
    type: object
  requests.KubePVCreateRequest:
    type: object
  requests.KubePVExpandRequest:
    properties:
      name:
        type: string
      newCapacity:
        description: '例如: 20Gi'
        type: string
    type: object
  requests.KubePodApplyYamlRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      yaml:
        type: string
    type: object
  requests.KubePodCreateRequest:
    properties:
      containerName:
        type: string
      image:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubePodEvictRequest:
    properties:
      namespace:
        type: string
      podName:
        type: string
    type: object
  requests.KubePodLabelPatchRequest:
    properties:
      add:
        additionalProperties:
          type: string
        description: 添加/更新的标签
        type: object
      name:
        type: string
      namespace:
        type: string
      remove:
        description: 要删除的标签 key
        items:
          type: string
        type: array
    type: object
  requests.KubePodUpdateRequest:
    properties:
      content:
        description: 原始 Pod JSON
        type: object
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeSecretCreateRequest:
    properties:
      annotations:
        type: string
      basic:
        $ref: '#/definitions/requests.BasicAuthFields'
      data:
        description: 通用键值（Opaque 或直接键值对）
        type: string
      docker:
        $ref: '#/definitions/requests.DockerFields'
      labels:
        type: string
      mode:
        description: 推荐传 mode（更语义化），兼容 type（原生 k8s 类型字符串）
        type: string
      name:
        type: string
      namespace:
        type: string
      ssh:
        $ref: '#/definitions/requests.SSHAuthFields'
      string_data:
        type: string
      tls:
        allOf:
        - $ref: '#/definitions/requests.TLSFields'
        description: 专用结构体
      type:
        type: string
    type: object
  requests.KubeSecretDecodeRequest:
    properties:
      data:
        additionalProperties:
          type: string
        description: '批量解码，例如 {"username": "YWRtaW4=", "password": "MTIzNDU2"}'
        type: object
      value:
        description: 单个字符串解码，例如 "YWRtaW4="
        type: string
    type: object
  requests.KubeServiceCreateRequest:
    properties:
      annotations:
        type: string
      cluster_ip:
        description: 可选项
        type: string
      external_traffic_policy:
        description: Local / Cluster（LB/NodePort 常用）
        type: string
      name:
        type: string
      namespace:
        description: 命名空间 & 名称
        type: string
      ports:
        description: 端口规则
        items:
          $ref: '#/definitions/requests.ServicePortRule'
        type: array
      selector:
        type: string
      selector_labels:
        description: 选择器：建议用 label 列表；也支持传 map（Swagger 里以字符串展示）
        items:
          $ref: '#/definitions/requests.Label'
        type: array
      session_affinity:
        description: None / ClientIP
        type: string
      type:
        description: |-
          Service 类型：ClusterIP / NodePort / LoadBalancer / Headless
          Headless 时 cluster_ip 建议传 "None"
        type: string
    type: object
  requests.KubeStatefulSetCreateRequest:
    properties:
      container_command:
        description: 容器启动命令
        type: string
      container_command_args:
        description: 容器启动参数
        type: string
      container_image:
        description: 主容器镜像
        type: string
      cpu_requirement:
        description: CPU 需求（可选）
        type: string
      description:
        description: 描述信息（可选）
        type: string
      image_pull_secret:
        description: 镜像/启动相关（可选）
        type: string
      is_create_service:
        description: Service 相关（StatefulSet 必须绑定一个服务名，通常为 Headless Service）
        type: boolean
      is_liveness_enable:
        description: 是否启用 Liveness
        type: boolean
      is_readiness_enable:
        description: 是否启用 Readiness
        type: boolean
      labels:
        description: 标签
        items:
          $ref: '#/definitions/requests.Label'
        type: array
      liveness_probe:
        allOf:
        - $ref: '#/definitions/requests.HealthCheckDetail'
        description: Liveness 配置
      memory_requirement:
        description: 资源/标签/环境变量/端口
        type: string
      name:
        description: 基本信息
        type: string
      namespace:
        description: 命名空间
        type: string
      port_mappings:
        description: 端口映射
        items:
          $ref: '#/definitions/requests.PortMapping'
        type: array
      readiness_probe:
        allOf:
        - $ref: '#/definitions/requests.HealthCheckDetail'
        description: Readiness 配置
      replicas:
        description: 副本数
        type: integer
      run_as_privileged:
        description: 探针/特权
        type: boolean
      service_name:
        description: 必填：绑定的 Service 名（Headless 推荐）
        type: string
      service_type:
        description: Service 类型（ClusterIP/NodePort/...；Headless 时忽略）
        type: string
      update_partition:
        description: 滚动更新策略（可选）
        type: integer
      variables:
        description: 环境变量
        items:
          $ref: '#/definitions/requests.EnvironmentVariable'
        type: array
      volume_claim_templates:
        description: 每个 Pod 的独立 PVC（StatefulSet 常用）
        items:
          $ref: '#/definitions/requests.VolumeClaimTemplate'
        type: array
    type: object
  requests.KubeStatefulSetRestartRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeStatefulSetRollbackRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      revision_name:
        description: 指定回滚到的历史版本（ControllerRevision）
        type: string
    type: object
  requests.KubeStatefulSetScaleRequest:
    properties:
      name:
        type: string
      namespace:
        type: string
      scale_num:
        description: 副本数量
        type: integer
    type: object
  requests.KubeStatefulSetUpdateImageRequest:
    properties:
      container:
        description: 目标容器名称
        type: string
      image:
        description: 新镜像地址，例如 mysql:8.0
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  requests.KubeStorageClassCreateRequest:
    properties:
      allowVolumeExpansion:
        type: boolean
      mountOptions:
        items:
          type: string
        type: array
      name:
        type: string
      parameters:
        type: string
      provisioner:
        type: string
      reclaimPolicy:
        description: Delete / Retain
        type: string
      volumeBindingMode:
        description: Immediate / WaitForFirstConsumer
        type: string
    type: object
  requests.Label:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  requests.MultiResourceCreateResult:
    properties:
      created:
        description: 成功创建的资源
        items:
          $ref: '#/definitions/requests.CreatedResource'
        type: array
      failed:
        description: 创建失败的资源
        items:
          $ref: '#/definitions/requests.FailedResource'
        type: array
      total:
        description: 总资源数
        type: integer
    type: object
  requests.MultiResourceParsedResult:
    properties:
      errors:
        items:
          type: string
        type: array
      resources:
        items:
          $ref: '#/definitions/requests.ParsedResource'
        type: array
      total:
        type: integer
    type: object
  requests.ParsedResource:
    properties:
      apiVersion:
        description: API 版本
        type: string
      content:
        description: 原始 YAML 内容
        type: string
      dependsOn:
        description: 依赖的资源
        items:
          $ref: '#/definitions/requests.ResourceRef'
        type: array
      index:
        description: 在原始 YAML 中的索引
        type: integer
      kind:
        description: 资源类型 (Deployment, Service, ConfigMap 等)
        type: string
      name:
        description: 资源名称
        type: string
      namespace:
        description: 命名空间
        type: string
      order:
