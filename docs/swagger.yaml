        type: string
      name:
        description: 端口名，可选
        type: string
      node_port:
        description: NodePort（仅在 NodePort/LoadBalancer 类型下生效），可选
        type: integer
      port:
        description: Service 暴露端口（1~65535）
        type: integer
      protocol:
        description: 协议：TCP/UDP/SCTP
        type: string
      target_port:
        description: 指向 Pod 的容器端口；为兼容命名端口，这里用字符串（Swagger 友好）
        type: string
    type: object
  requests.TLSFields:
    properties:
      cert:
        description: -> tls.crt
